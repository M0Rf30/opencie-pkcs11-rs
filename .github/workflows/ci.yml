name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout bindings
        uses: actions/checkout@v4
        with:
          path: opencie-pkcs11-rs

      - name: Checkout C library
        uses: actions/checkout@v4
        with:
          repository: M0Rf30/opencie-pkcs11
          path: opencie-pkcs11

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ libclang-dev ninja-build pkg-config python3-pip \
            libcrypto++-dev libcurl4-openssl-dev libfontconfig1-dev \
            libfreetype6-dev libpcsclite-dev libpng-dev libssl-dev \
            libxml2-dev
          # Install a recent Meson (>=0.64) which supports meson.options.
          # Ubuntu 22.04 ships 0.61, which fails on upstream's meson.options.
          sudo pip3 install --upgrade 'meson>=1.3.0'
          meson --version

      - name: Build C library
        working-directory: opencie-pkcs11
        run: |
          meson setup build --buildtype=release --prefix=/usr
          meson compile -C build
          sudo meson install -C build
          sudo ldconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt --check
        working-directory: opencie-pkcs11-rs
        run: cargo fmt --all -- --check

      - name: cargo build
        working-directory: opencie-pkcs11-rs
        env:
          OPENCIE_PKCS11_DIR: ${{ github.workspace }}/opencie-pkcs11
        run: cargo build --verbose

      - name: cargo clippy
        working-directory: opencie-pkcs11-rs
        env:
          OPENCIE_PKCS11_DIR: ${{ github.workspace }}/opencie-pkcs11
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: opencie-pkcs11-rs
        env:
          OPENCIE_PKCS11_DIR: ${{ github.workspace }}/opencie-pkcs11
        run: cargo test --verbose
